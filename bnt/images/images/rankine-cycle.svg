<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .equipment { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .pipe { stroke: #333; stroke-width: 2; fill: none; }
      .label { font-size: 13px; font-family: Arial; font-weight: bold; }
      .small-label { font-size: 11px; font-family: Arial; }
      .state-point { fill: #cc0000; }
      .process-line { stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="400" y="25" class="label" text-anchor="middle">Rankine Cycle: Realistic Steam Cycle</text>

  <!-- Equipment Boxes -->
  <!-- Boiler/Steam Generator -->
  <rect x="50" y="80" width="120" height="80" class="equipment"/>
  <text x="110" y="115" class="small-label" text-anchor="middle" font-weight="bold">BOILER</text>
  <text x="110" y="135" class="small-label" text-anchor="middle">(Steam</text>
  <text x="110" y="150" class="small-label" text-anchor="middle">Generator)</text>

  <!-- Turbine -->
  <circle cx="350" cy="120" r="50" class="equipment"/>
  <text x="350" y="120" class="label" text-anchor="middle" text-anchor="middle">TURBINE</text>

  <!-- Condenser -->
  <rect x="550" y="80" width="120" height="80" class="equipment"/>
  <text x="610" y="120" class="label" text-anchor="middle">CONDENSER</text>

  <!-- Pump -->
  <circle cx="200" cy="350" r="40" class="equipment"/>
  <text x="200" y="355" class="label" text-anchor="middle">PUMP</text>

  <!-- Connecting pipes -->
  <!-- Boiler to Turbine -->
  <path d="M 170 120 L 300 120" class="pipe"/>

  <!-- Turbine to Condenser -->
  <path d="M 400 120 L 550 120" class="pipe"/>

  <!-- Condenser to Pump -->
  <path d="M 610 160 L 610 280 L 240 280" class="pipe"/>

  <!-- Pump to Boiler -->
  <path d="M 160 280 L 110 280 L 110 160" class="pipe"/>

  <!-- State points -->
  <circle cx="130" cy="120" r="4" class="state-point"/>
  <circle cx="290" cy="120" r="4" class="state-point"/>
  <circle cx="530" cy="120" r="4" class="state-point"/>
  <circle cx="610" cy="160" r="4" class="state-point"/>
  <circle cx="240" cy="280" r="4" class="state-point"/>
  <circle cx="130" cy="160" r="4" class="state-point"/>

  <!-- State labels with conditions -->
  <text x="130" y="65" class="small-label" text-anchor="middle" fill="#0066cc">State 1</text>
  <text x="130" y="50" class="small-label" text-anchor="middle" fill="#666">(Low P, Liquid)</text>

  <text x="290" y="65" class="small-label" text-anchor="middle" fill="#0066cc">State 2</text>
  <text x="290" y="50" class="small-label" text-anchor="middle" fill="#666">(High P, Liquid)</text>

  <text x="530" y="65" class="small-label" text-anchor="middle" fill="#0066cc">State 3</text>
  <text x="530" y="50" class="small-label" text-anchor="middle" fill="#666">(High P, Vapor)</text>

  <text x="610" y="200" class="small-label" text-anchor="middle" fill="#0066cc">State 4</text>
  <text x="610" y="185" class="small-label" text-anchor="middle" fill="#666">(Low P, Vapor)</text>

  <!-- Process descriptions in boxes -->
  <rect x="20" y="200" width="280" height="120" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="160" y="220" class="small-label" text-anchor="middle" font-weight="bold">Four Processes:</text>
  <text x="30" y="240" class="small-label">1→2: Pump Compression (Adiabatic)</text>
  <text x="30" y="260" class="small-label">2→3: Boiler Heat Addition (Isobaric)</text>
  <text x="30" y="280" class="small-label">3→4: Turbine Expansion (Adiabatic)</text>
  <text x="30" y="300" class="small-label">4→1: Condenser Heat Rejection (Isobaric)</text>

  <!-- Key differences from Carnot -->
  <rect x="480" y="200" width="280" height="120" fill="#ffffcc" stroke="#ff6600" stroke-width="1"/>
  <text x="620" y="220" class="small-label" text-anchor="middle" font-weight="bold">vs. Carnot Cycle:</text>
  <text x="490" y="240" class="small-label" fill="#666">✓ More realistic (uses isobars</text>
  <text x="490" y="260" class="small-label" fill="#666">instead of isotherms)</text>
  <text x="490" y="280" class="small-label" fill="#666">✓ All pressure changes occur at</text>
  <text x="490" y="300" class="small-label" fill="#666">two points (pump & turbine)</text>

  <!-- Net work arrow -->
  <path d="M 150 380 L 250 380" stroke="#00aa00" stroke-width="3" fill="none" marker-end="url(#arrowgreen)"/>
  <text x="200" y="405" class="small-label" text-anchor="middle" fill="#00aa00">Net Work Output = W_turbine - W_pump</text>

  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00aa00"/>
    </marker>
  </defs>
</svg>